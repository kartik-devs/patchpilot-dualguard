# PatchPilot v2 "DualGuard" — LoRA SFT hyperparameters.
# Read by train/finetune_lora.py (TrainConfig.from_yaml) and training/train_lora.py.
# Mirrors spec §3·MG7. The 32B base is optional; 7B is the budget-friendly default.

base_model: "Qwen/Qwen2.5-Coder-7B-Instruct"   # 32B optional: Qwen/Qwen2.5-Coder-32B-Instruct
dataset: "data/sft/train.jsonl"
out_dir: "models/adapters/run"

bf16: true
max_seq_len: 8192
per_device_batch: 1
grad_accum: 16
lr: 1.0e-4
epochs: 2
warmup_ratio: 0.03
weight_decay: 0.0
logging_steps: 5
save_steps: 50
save_total_limit: 3
gradient_checkpointing: true
seed: 13

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
